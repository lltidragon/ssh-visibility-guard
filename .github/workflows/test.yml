name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python3 -m pip install pytest
      - name: Run unit tests
        run: python3 -m pytest tests/ -v
      - name: Syntax-check shell scripts
        run: |
          bash -n hooks/ssh-pane
          bash -n hooks/ssh-status
          bash -n install.sh
          bash -n uninstall.sh
